<!-- @dsCard group="Components" viewport="700x300" name="Form Controls" subtitle="Input, switch, and task checkbox" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 16px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Switch, Checkbox } = window.WORKODesignSystem_3ef60c;
    function Demo() {
      const [music, setMusic] = React.useState(true);
      const [notif, setNotif] = React.useState(false);
      const [t1, setT1] = React.useState(true);
      const [t2, setT2] = React.useState(false);
      return (
        <div className="grid">
          <div className="col">
            <Input label="Task name" placeholder="What needs doing?" hint="Press enter to add" />
            <Input label="Email" type="email" defaultValue="not-an-email" error="That email looks off" />
          </div>
          <div className="col">
            <Switch checked={music} onChange={setMusic} label="Focus music" />
            <Switch checked={notif} onChange={setNotif} label="Break reminders" />
            <div style={{height:8}}></div>
            <Checkbox round checked={t1} onChange={setT1} label="Draft the launch email" />
            <Checkbox round checked={t2} onChange={setT2} label="Review Q3 roadmap" />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
  </script>
</body>
</html>
