<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-app); padding: 28px; }
  .stack { display: flex; flex-direction: column; gap: 20px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Card, Badge, Avatar, AvatarGroup, ProgressBar } = window.WORKODesignSystem_3ef60c;
    function Demo() {
      return (
        <div className="stack">
          <div className="row">
            <Badge tone="primary" dot>In progress</Badge>
            <Badge tone="warning" dot>High priority</Badge>
            <Badge tone="success">Done</Badge>
            <Badge tone="accent">AI suggested</Badge>
            <Badge tone="neutral">Backlog</Badge>
          </div>
          <Card style={{maxWidth: 360}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: 12}}>
              <strong style={{fontSize:16, color:"var(--text-primary)"}}>Q3 Product Launch</strong>
              <AvatarGroup users={[{name:"Maya Chen"},{name:"Sam Ito"},{name:"Lee Roy"},{name:"Ana Diaz"}]} max={3} />
            </div>
            <ProgressBar value={72} showLabel />
            <p style={{margin:"12px 0 0", fontSize:14, color:"var(--text-muted)"}}>12 of 18 tasks complete</p>
          </Card>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
  </script>
</body>
</html>
