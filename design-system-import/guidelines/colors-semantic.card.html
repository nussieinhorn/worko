<!-- @dsCard group="Colors" viewport="700x150" name="Semantic Status" subtitle="Success, warning, error" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 20px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { width: 150px; height: 64px; border-radius: var(--radius-card); }
  .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .hex { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-success)"></div><span class="name">Success</span><span class="hex">#10B981</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-warning)"></div><span class="name">Warning</span><span class="hex">#F59E0B</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-error)"></div><span class="name">Error</span><span class="hex">#EF4444</span></div>
  </div>
</body>
</html>
