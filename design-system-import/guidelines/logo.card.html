<!-- @dsCard group="Brand" viewport="700x220" name="Logo & Mark" subtitle="Wordmark, lockup, and momentum mark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 28px; }
  .grid { display: flex; gap: 28px; align-items: stretch; flex-wrap: wrap; }
  .tile { display: flex; flex-direction: column; gap: 14px; align-items: center; justify-content: center; padding: 24px; border-radius: var(--radius-card); border: 1px solid var(--border); flex: 1; min-width: 180px; }
  .dark { background: var(--slate-900); border-color: var(--slate-800); }
  .cap { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; }
  .dark .cap { color: var(--slate-400); }
  .marks { display: flex; gap: 18px; align-items: center; }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile"><img src="../assets/worko-logo.svg" alt="WORKO" height="40"><span class="cap">Primary lockup</span></div>
    <div class="tile dark"><img src="../assets/worko-logo-dark.svg" alt="WORKO" height="40"><span class="cap">On dark</span></div>
    <div class="tile">
      <div class="marks">
        <img src="../assets/worko-mark.svg" alt="mark" height="40">
        <img src="../assets/worko-mark.svg" alt="mark" height="28">
        <img src="../assets/worko-mark.svg" alt="mark" height="20">
      </div>
      <span class="cap">Mark · 40 / 28 / 20px</span>
    </div>
  </div>
</body>
</html>
