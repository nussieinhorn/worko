<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 24px; color: var(--text-primary); }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .h1 { font-size: var(--text-5xl); font-weight: 800; letter-spacing: var(--tracking-tight); line-height: 1; }
  .h2 { font-size: var(--text-3xl); font-weight: 700; letter-spacing: var(--tracking-tight); }
  .h3 { font-size: var(--text-xl); font-weight: 700; letter-spacing: var(--tracking-snug); }
  .meta { font-size: 11px; color: var(--text-muted); font-weight: 500; }
</style>
</head>
<body>
  <div class="stack">
    <div><div class="h1">Work Smarter. Finish Faster.</div><span class="meta">Display · 48px · 800</span></div>
    <div><div class="h2">Your AI Work Companion</div><span class="meta">Heading · 30px · 700</span></div>
    <div><div class="h3">Focus on what matters today</div><span class="meta">Subhead · 20px · 700</span></div>
  </div>
</body>
</html>
