<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base — generous whitespace" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 24px; }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .bar { background: var(--color-accent); width: 28px; border-radius: 4px; }
  .name { font-size: 11px; font-weight: 600; color: var(--text-primary); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:8px"></div><span class="name">2 · 8</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="name">4 · 16</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="name">6 · 24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="name">8 · 32</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="name">12 · 48</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="name">16 · 64</span></div>
    <div class="item"><div class="bar" style="height:80px"></div><span class="name">20 · 80</span></div>
  </div>
</body>
</html>
