<!-- @dsCard group="Colors" viewport="700x150" name="Primary & Accent" subtitle="Deep indigo primary, vibrant cyan accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 20px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { width: 150px; height: 64px; border-radius: var(--radius-card); border: 1px solid rgba(15,23,42,0.06); }
  .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .hex { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-primary)"></div><span class="name">Primary</span><span class="hex">#4F46E5</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-primary-hover)"></div><span class="name">Primary Hover</span><span class="hex">#4338CA</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-primary-light);border-color:var(--border)"></div><span class="name">Primary Light</span><span class="hex">#EEF2FF</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-accent)"></div><span class="name">Accent</span><span class="hex">#06B6D4</span></div>
  </div>
</body>
</html>
