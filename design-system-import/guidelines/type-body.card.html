<!-- @dsCard group="Type" viewport="700x180" name="Body & UI Text" subtitle="Inter Regular / Medium" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 24px; color: var(--text-primary); }
  .stack { display: flex; flex-direction: column; gap: 14px; max-width: 600px; }
  .lead { font-size: var(--text-lg); font-weight: 400; color: var(--text-secondary); line-height: var(--leading-relaxed); }
  .body { font-size: var(--text-base); font-weight: 400; color: var(--text-secondary); line-height: var(--leading-normal); }
  .label { font-size: var(--text-sm); font-weight: 500; color: var(--text-muted); }
  .meta { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-top: 4px; }
</style>
</head>
<body>
  <div class="stack">
    <div><p class="lead" style="margin:0">Open WORKO, and it tells you exactly what to work on next.</p><span class="meta">Lead · 18px · 400</span></div>
    <div><p class="body" style="margin:0">WORKO actively helps people complete their work — prioritizing tasks, guiding focus, and keeping momentum all day long.</p><span class="meta">Body · 16px · 400</span></div>
    <div><span class="label">FOCUS SESSION · 25 MIN</span><span class="meta">Label · 14px · 500</span></div>
  </div>
</body>
</html>
