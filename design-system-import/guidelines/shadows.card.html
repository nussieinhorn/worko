<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Soft, subtle shadows — no harsh darks" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-app); padding: 28px; }
  .row { display: flex; gap: 28px; align-items: center; }
  .item { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .box { width: 110px; height: 76px; background: var(--surface); border-radius: var(--radius-card); }
  .name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="name">sm</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="name">md</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="name">lg</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="name">xl</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-primary)"></div><span class="name">primary</span></div>
  </div>
</body>
</html>
